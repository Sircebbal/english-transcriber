<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Transcriber</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">

      <div class="top-bar">
        <div class="left">
          <div id="statusDot" class="dot"></div>
          <span id="status">Ready</span>
        </div>
        <div class="right">
          <span id="timer">00:00</span>
          <span id="wordCount"></span>
        </div>
      </div>

      <div id="chunkBox">
        <p id="placeholder">Press start and begin speaking...</p>
        <div id="chunkText"></div>
      </div>

      <div class="controls">
        <button id="micBtn">🎙 Start</button>
        <button id="saveBtn">Save transcript</button>
      </div>

    </div>
    <script src="script.js"></script>
  </body>
</html>
